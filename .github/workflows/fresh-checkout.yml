name: Fresh checkout

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify fresh checkout
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        run: rustup show

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            desktop/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('desktop/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install JS dependencies
        run: npm ci

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Verify
        run: npm run verify
